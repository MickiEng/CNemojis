<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CN Emoji Widget - Bubbly Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --line-color: #4A90E2; 
            --btn-hover: #f0f7ff;
            --btn-active: #e1efff;
            --title-gradient: linear-gradient(45deg, #ff6b6b, #48dbfb, #feca57);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Changed from height to min-height for scrolling on small phones */
            margin: 0;
            padding: 10px; /* Buffer for mobile edges */
            box-sizing: border-box;
        }

        .lms-widget {
            background: var(--bg-color);
            padding: 20px;
            border: 1px solid #ddd;
            display: flex; /* Switched to flex for better vertical stacking on mobile */
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 750px; /* Keeps your original desktop size */
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-radius: 20px;
position: relative;
        }

        .instruction {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            background: var(--title-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.05));
        }

        /* --- THE NEW BUTTON GRID --- */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 buttons across on mobile */
            gap: 10px;
            width: 100%;
        }

        /* Desktop Adjustment: Back to a more spread out look on wider screens */
        @media (min-width: 600px) {
            .btn-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .cn-btn {
            width: 100%; /* Now fluid within the grid */
            background: white;
            border: 2px solid var(--line-color);
            border-radius: 25px;
            padding: 12px 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Fredoka', sans-serif;
            color: var(--line-color);
            transition: all 0.2s ease;
            position: relative;
        }

        .cn-btn:hover { 
            background: var(--btn-hover); 
            transform: translateY(-1px);
        }
        
        .cn-btn.active { 
            background: var(--line-color); 
            color: white;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        .display-area {
            width: 100%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #fafafa;
            border-radius: 15px;
            padding: 10px;
            box-sizing: border-box;
        }

        #emoji-viewer {
            font-size: 80px; /* Slightly reduced for mobile height */
            margin-bottom: 15px;
            display: inline-block;
        }

        #description {
            font-size: 16px;
            color: #222;
            padding: 0 10px;
            line-height: 1.4;
        }

        /* --- ANIMATIONS (UNCHANGED) --- */
        @keyframes glisten {
            0% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)) brightness(1); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 223, 0, 0.9)) brightness(1.8); }
            100% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)) brightness(1); }
        }
        .glisten { animation: glisten 0.9s ease-in-out; }

        @keyframes jiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }
        .jiggle { animation: jiggle 0.6s ease-in-out; }

        .both { animation: glisten 0.9s ease-in-out, jiggle 0.6s ease-in-out; }

        .legend {
            display: flex;
            flex-wrap: wrap; /* Wrap legend items on small screens */
            justify-content: center;
            gap: 15px;
            font-size: 13px;
            color: #666;
            margin-top: 10px;
            font-weight: 400;
        }
        
        #reset-btn { 
            background: none; 
            border: none; 
            text-decoration: underline; 
            color: #999; 
            cursor: pointer; 
            font-size: 11px; 
            margin-top: 5px; 
            font-family: 'Fredoka', sans-serif;
            align-self: center;
        }
.widget-logo {
    position: absolute;
    top: 15px;
    right: 15px;
    max-height: 45px;
    width: auto;
    z-index: 100;
}
@media screen and (max-width: 600px) {
    .widget-logo {
        position: static !important;
        display: block !important;
        margin: 20px auto 10px auto !important;
        max-height: 35px !important;
    }
.lms-widget {
        position: relative; /* "Traps" the logo in the top-right on desktop */
        padding-top: 45px;  /* Space for logo on desktop so it won't hit the title */
    }
}
    </style>
</head>
<body>

<div class="lms-widget">
    <div class="instruction">Cranial Nerve Emoji Functions</div>

    <div class="display-area">
        <div id="emoji-viewer">🧠</div>
        <div id="description">Select a nerve to begin.</div>
    </div>

    <div class="btn-grid">
        <button class="cn-btn" onclick="testCN(1, this)">CN I</button>
        <button class="cn-btn" onclick="testCN(2, this)">CN II</button>
        <button class="cn-btn" onclick="testCN(3, this)">CN III</button>
        <button class="cn-btn" onclick="testCN(4, this)">CN IV</button>
        <button class="cn-btn" onclick="testCN(5, this)">CN V</button>
        <button class="cn-btn" onclick="testCN(6, this)">CN VI</button>
        <button class="cn-btn" onclick="testCN(7, this)">CN VII</button>
        <button class="cn-btn" onclick="testCN(8, this)">CN VIII</button>
        <button class="cn-btn" onclick="testCN(9, this)">CN IX</button>
        <button class="cn-btn" onclick="testCN(10, this)">CN X</button>
        <button class="cn-btn" onclick="testCN(11, this)">CN XI</button>
        <button class="cn-btn" onclick="testCN(12, this)">CN XII</button>
    </div>

    <button id="reset-btn" onclick="resetAll()">Reset View</button>

    <div class="legend">
        <span>✨ Glisten = Sensory</span>
        <span>〰️ Jiggle = Motor</span>
        <span>✨〰️ Both = Mixed Nerve</span>
    </div>
<img src="beal_logo_blue_sm.webp" alt="Beal University Logo" class="widget-logo">
</div>

<script>
    // DATA AND SCRIPT LEFT EXACTLY THE SAME
    const data = {
        1: { emoji: '👃', type: 'glisten', desc: 'Olfactory: Sense of smell.' },
        2: { emoji: '👓', type: 'glisten', desc: 'Optic: Visual acuity and fields.' },
        3: { emoji: '👁️', type: 'jiggle', desc: 'Oculomotor: Pupil constriction and lid lift.' },
        4: { emoji: '↘️', type: 'jiggle', desc: 'Trochlear: Downward and inward eye movement.' },
        5: { emoji: '👄', type: 'both', desc: 'Trigeminal: Facial sensation and chewing.' },
        6: { emoji: '↔️', type: 'jiggle', desc: 'Abducens: Lateral (outward) eye movement.' },
        7: { emoji: '😊', type: 'both', desc: 'Facial: Expressions and anterior taste.' },
        8: { emoji: '👂', type: 'glisten', desc: 'Vestibulocochlear: Hearing and balance.' },
        9: { emoji: '👅', type: 'both', desc: 'Glossopharyngeal: Swallow and posterior taste.' },
        10: { emoji: '🤢', type: 'both', desc: 'Vagus: Gag reflex and parasympathetic flow.' },
        11: { emoji: '🤷', type: 'jiggle', desc: 'Accessory: Shoulder shrug and neck turning.' },
        12: { emoji: '👅', type: 'jiggle', desc: 'Hypoglossal: Tongue movement and strength.' }
    };

    function resetAll() {
        const viewer = document.getElementById('emoji-viewer');
        viewer.innerHTML = '🧠';
        viewer.className = '';
        document.getElementById('description').innerHTML = 'Select a nerve to begin.';
        document.querySelectorAll('.cn-btn').forEach(b => b.classList.remove('active'));
    }

    function testCN(num, btn) {
        document.querySelectorAll('.cn-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const viewer = document.getElementById('emoji-viewer');
        const desc = document.getElementById('description');
        viewer.className = ''; 
        void viewer.offsetWidth; 
        viewer.innerHTML = data[num].emoji;
        viewer.classList.add(data[num].type);
        desc.innerHTML = data[num].desc;
    }
</script>
</body>
</html>
